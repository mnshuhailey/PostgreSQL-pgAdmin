services:
  db:
    image: postgres:18
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: pgdatabase
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql
    networks:
      - local_net

  pgadmin:
    image: dpage/pgadmin4:9.14
    container_name: pgadmin_container
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: pgadmin@gates.edu.my
      PGADMIN_DEFAULT_PASSWORD: secret123
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5010:80"
    volumes:
      - ./pgadmin-data:/var/lib/pgadmin
    networks:
      - local_net

networks:
  local_net:
    driver: bridge
